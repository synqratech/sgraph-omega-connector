name: Feature request
description: Propose an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe desired behavior.
    validations:
      required: true
  - type: textarea
    id: contract_impact
    attributes:
      label: Contract impact
      description: Does this change OpenAPI fields, auth, or error semantics?
      placeholder: none / additive / breaking
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives or tradeoffs?
