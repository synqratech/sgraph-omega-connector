worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  # Keep request size limits explicit at http/server/location levels
  # to avoid falling back to nginx defaults (~1MB) in any route.
  client_max_body_size 64m;

  server {
    listen 8088 ssl;
    server_name localhost;
    client_max_body_size 64m;

    ssl_certificate     /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;

    location = /healthz {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://connector:18080/healthz;
    }

    location /v1/ {
      client_max_body_size 64m;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://connector:18080;
    }

    location /omega/ {
      client_max_body_size 64m;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      rewrite ^/omega/(.*)$ /$1 break;
      proxy_pass http://omega-api:8080;
    }

    location /sgraph/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      rewrite ^/sgraph/(.*)$ /$1 break;
      proxy_pass http://sgraph-user-api:10062;
    }
  }
}
